      - ./configs/nodes/node-4/node.conf:/node/node.conf
      - ./configs/nodes/node-4/keystore.dat:/node/keystore.dat
      - node-4-data:/node/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
networks:
  w3-network:
    driver: bridge
volumes:
  node-0-data:
  node-1-data:
  node-2-data:
  node-3-data:
  node-4-data: