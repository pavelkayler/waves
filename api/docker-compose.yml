version: '3'
services:
  node-0:
    image: web3techru/confident:v1.9.0
    ports:
      - "6862:6862"
      - "6864:6864"
      - "6865:6865"
    networks:
      - w3-network
    hostname: node-0
    container_name: node-0
    env_file:
      - ./env/node-0.env
    volumes:
      - ./configs/nodes/node-0/node.conf:/node/node.conf
      - ./configs/nodes/node-0/keystore.dat:/node/keystore.dat
      - node-0-data:/node/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
  node-1:
    image: web3techru/confident:v1.9.0
    ports:
      - "6872:6862"
      - "6874:6864"
      - "6875:6865"
    networks:
      - w3-network
    hostname: node-1
    container_name: node-1
    env_file:
      - ./env/node-1.env
    volumes:
      - ./configs/nodes/node-1/node.conf:/node/node.conf
      - ./configs/nodes/node-1/keystore.dat:/node/keystore.dat
      - node-1-data:/node/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
  node-2:
    image: web3techru/confident:v1.9.0
    ports:
      - "6882:6862"
      - "6884:6864"
      - "6885:6865"
    networks:
      - w3-network
    hostname: node-2
    container_name: node-2
    env_file:
      - ./env/node-2.env
    volumes:
      - ./configs/nodes/node-2/node.conf:/node/node.conf
      - ./configs/nodes/node-2/keystore.dat:/node/keystore.dat
      - node-2-data:/node/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
  node-3:
    image: web3techru/confident:v1.9.0
    ports:
      - "6812:6862"
      - "6814:6864"
      - "6815:6865"
    networks:
      - w3-network
    hostname: node-3
    container_name: node-3
    env_file:
      - ./env/node-3.env
    volumes:
      - ./configs/nodes/node-3/node.conf:/node/node.conf
      - ./configs/nodes/node-3/keystore.dat:/node/keystore.dat
      - node-3-data:/node/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
  node-4:
    image: web3techru/confident:v1.9.0
    ports:
      - "6822:6862"
      - "6824:6864"
      - "6825:6865"
    networks:
      - w3-network
